name: mr-review-flow
description: >
  Triggers PR Review Buddy automatically when a Merge Request is opened
  or updated with new commits. Passes the full diff and MR context to
  the agent for review.
version: "1.0"

trigger:
  events:
    - merge_request:opened
    - merge_request:pushed

steps:
  - name: review-merge-request
    agent: pr-review-buddy
    input:
      context:
        - merge_request.diff
        - merge_request.title
        - merge_request.description
        - merge_request.target_branch
        - merge_request.source_branch
      instruction: |
        A new Merge Request has been opened or updated.
        Review the provided code diff thoroughly.
        For every issue you find, post an inline comment on the exact 
        file and line with severity, explanation, and a concrete fix.
        After all inline comments, post one final summary comment with 
        your overall recommendation: APPROVE, REQUEST CHANGES, or 
        NEEDS DISCUSSION.
        Be direct. Be specific. Every comment must include a fix.
