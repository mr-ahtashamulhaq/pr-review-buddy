name: pr-review-buddy
description: >
  Automatically reviews Merge Requests for bugs, security vulnerabilities,
  missing error handling, and code quality issues. Posts structured inline
  comments with specific fixes and an overall recommendation.
version: "1.0"
model: claude
system_prompt_file: system_prompt.md
tools:
  - read_merge_request
  - list_changed_files
  - read_file
  - post_inline_comment
  - post_merge_request_comment
